<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IFDA SPOT - H4 SNIPER ENGINE</title>
    <style>
        :root { 
            --bg: #080a0c; 
            --neon: #ff9d00; /* Orange Spot */
            --gold: #ffc107; 
            --text: #f8fafc; 
            --red: #ff3333; 
            --green: #00ff88; 
            --border: rgba(255, 157, 0, 0.2); 
        }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        /* LOCK SCREEN 197800 */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .lock-box { background: rgba(20, 15, 10, 0.95); padding: 30px; border-radius: 20px; border: 1px solid var(--neon); text-align: center; width: 85%; max-width: 320px; box-shadow: 0 0 25px rgba(255, 157, 0, 0.15); }
        .key-input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--neon); border-radius: 12px; color: var(--neon); text-align: center; font-size: 26px; letter-spacing: 4px; margin-top: 20px; outline: none; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.85); border-bottom: 1px solid var(--border); }
        #clock { color: var(--neon); font-family: monospace; font-size: 14px; font-weight: bold; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(15, 12, 10, 0.98); display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid var(--border); z-index: 5000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { padding: 18px 2px; font-size: 9px; font-weight: bold; text-align: center; cursor: pointer; color: #64748b; text-transform: uppercase; transition: 0.3s; }
        .nav-item.active { color: var(--neon); border-top: 2px solid var(--neon); background: rgba(255, 157, 0, 0.05); }

        .content-area { height: calc(100vh - 120px); overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .glass-card { background: rgba(20, 15, 10, 0.85); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 22px; padding: 20px; margin-bottom: 15px; }
        
        input, select { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: white; margin-top: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: var(--neon); }

        .btn-main { width: 100%; padding: 18px; background: var(--neon); border: none; border-radius: 14px; color: #000; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .member-line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
    </style>
</head>
<body>

    <!-- ÉCRAN DE VÉRIFICATION -->
    <div id="lock-screen">
        <div class="lock-box">
            <div style="color: var(--gold); font-size: 12px; text-transform: uppercase;">Labo SANGMELIMA</div>
            <div style="color: var(--neon); font-size: 20px; font-weight: bold; margin-top: 5px;">IFDA SPOT H4</div>
            <input type="password" id="master-key" class="key-input" placeholder="••••••" maxlength="6">
            <button onclick="checkKey()" class="btn-main">DÉVERROUILLER</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="top-bar">
            <div id="clock">00:00:00</div>
            <div style="font-size: 10px; color: var(--neon); font-weight: bold;">SPOT ENGINE v1.0</div>
        </div>

        <div class="content-area">
            <!-- DASHBOARD -->
            <div id="dash" class="tab-content">
                <div class="glass-card">
                    <span id="engine-status" style="color:var(--red); font-size:10px;">● ENGINE STANDBY</span>
                    <div style="display:flex; justify-content:space-around; margin:25px 0; text-align:center;">
                        <div><small style="color: #64748b;">ACHAT FIXE</small><div id="display-cap" style="font-size:26px; color:var(--neon); font-weight:bold;">$10</div></div>
                        <div><small style="color: #64748b;">TIMEFRAME</small><div style="font-size:26px; color:var(--green); font-weight:bold;">H4</div></div>
                    </div>
                    <div id="realtime-monitor" style="background:#000; height:180px; border-radius:12px; padding:12px; font-family:monospace; font-size:11px; color:var(--neon); overflow-y:auto; border: 1px solid var(--border); line-height: 1.5;">
                        <div id="logs">> En attente de configuration...</div>
                    </div>
                </div>
                <button onclick="location.reload()" style="width:100%; padding:14px; background:rgba(255,51,51,0.1); border:1px solid var(--red); border-radius:12px; color:var(--red); font-size:12px; font-weight:bold;">ARRÊT D'URGENCE</button>
            </div>

            <!-- CONFIG AUTO -->
            <div id="config" class="tab-content" style="display:none;">
                <div class="glass-card">
                    <h3 style="color:var(--neon); margin-top:0;">CONFIGURATION H4</h3>
                    <label style="font-size: 11px; color: #64748b;">MONTANT PAR ACHAT (USDT)</label>
                    <input type="number" id="trade-qty" value="10" placeholder="Ex: 10">
                    
                    <label style="font-size: 11px; color: #64748b; margin-top: 15px; display: block;">ÉCHANGEUR TARGET</label>
                    <select id="ex-id">
                        <option value="mexc" selected>MEXC Global</option>
                        <option value="okx">OKX</option>
                        <option value="binance">Binance</option>
                        <option value="bingx">BingX</option>
                        <option value="bybit">Bybit</option>
                    </select>

                    <input type="text" id="api-key" placeholder="API KEY">
                    <input type="password" id="api-secret" placeholder="API SECRET">
                    <input type="password" id="api-pass" placeholder="PASSPHRASE (Si requis)">
                    
                    <button onclick="startSpot()" class="btn-main">ACTIVER LE SNIPER H4</button>
                </div>
            </div>

            <!-- NEWS & TEAM (RÉINTÉGRÉS) -->
            <div id="macro" class="tab-content" style="display:none;">
                <div class="glass-card" style="height: 400px; padding: 0; overflow: hidden;">
                    <iframe src="https://sslecal2.investing.com?importance=2,3&countries=5&timeZone=58&lang=5" width="100%" height="100%" frameborder="0"></iframe>
                </div>
            </div>

            <div id="team" class="tab-content" style="display:none;">
                <div class="glass-card">
                    <h3 style="color:var(--neon); margin-top:0;">CORE TEAM</h3>
                    <div class="member-line"><span>Nasser</span><span style="color:var(--neon);">DEV CHEF</span></div>
                    <div class="member-line"><span>Bertrand</span><span style="color:var(--neon);">TECH</span></div>
                    <div class="member-line"><span>Sébastien</span><span style="color:var(--neon);">COACH SMC</span></div>
                    <div class="member-line"><span>Franco</span><span style="color:var(--neon);">STRATÉGIE</span></div>
                    <div class="member-line"><span>Albert</span><span style="color:var(--neon);">LEADER</span></div>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="setTab('dash', this)">DASH</div>
            <div class="nav-item" onclick="setTab('config', this)">AUTO</div>
            <div class="nav-item" onclick="setTab('macro', this)">NEWS</div>
            <div class="nav-item" onclick="setTab('team', this)">TEAM</div>
            <div class="nav-item" onclick="setTab('faq', this)">FAQ</div>
        </div>
    </div>

    <script>
        // Remplacer par l'URL de ton serveur Termux (ex: http://192.168.1.XX:5001)
        const API_URL = "http://localhost:5001"; 

        function checkKey() {
            if(document.getElementById('master-key').value === "197800") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                alert("Clé invalide.");
            }
        }

        function startSpot() {
            const qty = document.getElementById('trade-qty').value || 10;
            const data = {
                action: 'start',
                exchange: document.getElementById('ex-id').value,
                ak: document.getElementById('api-key').value,
                as: document.getElementById('api-secret').value,
                passphrase: document.getElementById('api-pass').value,
                qty: qty
            };

            fetch(`${API_URL}/toggle_bot`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(data) 
            })
            .then(res => res.json())
            .then(() => {
                document.getElementById('engine-status').style.color = "var(--green)";
                document.getElementById('engine-status').innerText = "● ENGINE ACTIVE";
                document.getElementById('display-cap').innerText = "$" + qty;
                setTab('dash', document.querySelector('.nav-item'));
                setInterval(syncLogs, 4000);
            })
            .catch(() => alert("Erreur de liaison avec le moteur Python."));
        }

        function syncLogs() {
            fetch(`${API_URL}/get_status`).then(res => res.json()).then(data => {
                const logDiv = document.getElementById('logs');
                logDiv.innerHTML = data.logs.map(l => `<div>> ${l}</div>`).join('');
                logDiv.scrollTop = logDiv.scrollHeight;
            });
        }

        function setTab(id, el) { 
            document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none'); 
            document.getElementById(id).style.display='block'; 
            document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); 
            el.classList.add('active'); 
        }

        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
        }, 1000);
    </script>
</body>
</html>
